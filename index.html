<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'"
    />
    <title>Git Light</title>
    <link rel="icon" href="/src/assets/icon.png" type="image/png" />
    <script>
      ;(function () {
        try {
          var raw = localStorage.getItem('git-light:preferences')
          if (!raw) {
            document.documentElement.dataset.theme = 'default'
            return
          }
          var prefs = JSON.parse(raw)
          var theme = prefs.theme || 'default'
          var resolved = theme
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'default'
              : 'light'
          }
          document.documentElement.dataset.theme = resolved
        } catch (e) {
          document.documentElement.dataset.theme = 'default'
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
