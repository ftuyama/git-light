name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build signed DMG
        run: npm run dist:mac
        # No Apple secrets required — builds are ad-hoc signed automatically.
        # To enable Developer ID + notarization later, add env vars here; see DEVELOPER.md.

      - name: Verify macOS code signature
        run: npm run verify:mac-signing

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
